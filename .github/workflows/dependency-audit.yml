name: Dependency Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run every Monday at 06:00 UTC so we catch newly-disclosed advisories
    # even when no code lands for a week.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install (no scripts)
        run: npm ci --ignore-scripts

      # Fail the job on any HIGH or CRITICAL advisory. We allow "moderate"
      # for now to avoid noise from transitive dev-only packages; tighten
      # this once the baseline is clean.
      - name: Audit
        run: npm audit --omit=dev --audit-level=high
