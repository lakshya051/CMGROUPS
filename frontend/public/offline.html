<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e91e63" />
    <meta name="color-scheme" content="light" />
    <title>You're Offline — Shoptify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(160deg, #fff5f8 0%, #ffffff 45%, #f8fafc 100%);
            color: #1a1a2e;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        }
        .card {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 2rem 1.75rem;
            background: #ffffff;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(233, 30, 99, 0.08), 0 20px 40px -12px rgba(26, 26, 46, 0.12);
            border: 1px solid rgba(233, 30, 99, 0.06);
        }
        .logo-wrap {
            margin-bottom: 1.5rem;
        }
        .logo-wrap img {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            box-shadow: 0 12px 28px -8px rgba(233, 30, 99, 0.35);
            display: block;
            margin: 0 auto;
        }
        .wordmark {
            font-family: ui-rounded, system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 1.625rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-top: 1rem;
            color: #1a1a2e;
        }
        .wordmark span { color: #e91e63; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.25rem 0 0.5rem;
            padding: 0.35rem 0.85rem;
            background: #fdf2f7;
            color: #be185d;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-radius: 999px;
        }
        .status svg { flex-shrink: 0; opacity: 0.85; }
        h1 {
            font-size: 1.375rem;
            font-weight: 700;
            margin: 1rem 0 0.65rem;
            line-height: 1.3;
        }
        p {
            color: #6b7280;
            font-size: 0.9375rem;
            line-height: 1.65;
            margin-bottom: 1.25rem;
        }
        .hint {
            color: #9ca3af;
            font-size: 0.8125rem;
            margin-bottom: 1.5rem;
        }
        button {
            background: linear-gradient(180deg, #ec407a 0%, #e91e63 100%);
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 0.65rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 4px 14px -2px rgba(233, 30, 99, 0.45);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        button:hover { box-shadow: 0 6px 20px -2px rgba(233, 30, 99, 0.5); }
        button:active { transform: scale(0.98); }
        .footnote {
            color: #d1d5db;
            font-size: 0.75rem;
            margin-top: 1.35rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="/icons/icon-192x192.png" width="96" height="96" alt="Shoptify" decoding="async" />
            <p class="wordmark">Shopt<span>ify</span></p>
        </div>
        <div class="status" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
            </svg>
            No connection
        </div>
        <h1>You're offline</h1>
        <p>Check Wi‑Fi or mobile data, then try again.</p>
        <p class="hint">आप ऑफलाइन हैं। कृपया इंटरनेट जोड़कर पुनः प्रयास करें।</p>
        <button type="button" onclick="window.location.reload()">Try again</button>
        <p class="footnote">Pages you opened before may still load from this device.</p>
    </div>
</body>
</html>
