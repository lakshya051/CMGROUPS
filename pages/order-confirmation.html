<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | TechNova</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="header-container"></div>

    <main id="main-content">
        <section class="container" style="padding: 6rem 0; text-align: center;">
            <div class="glass-panel" style="max-width: 600px; margin: 0 auto; padding: 4rem;">
                <div style="font-size: 5rem; margin-bottom: 2rem;">✅</div>
                <h1 style="margin-bottom: 1rem;">Order Confirmed!</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem;">
                    Thank you for your purchase. Your order <span id="order-id"
                        style="color: var(--primary-color); font-weight: 700;">#</span> has been placed successfully.
                </p>
                <div class="flex gap-sm justify-center" style="justify-content: center;">
                    <a href="/" class="btn btn-outline">Return Home</a>
                    <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="../scripts/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('order-id').textContent = '#' + (params.get('id') || 'UNKNOWN');
    </script>
</body>

</html>
