<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | TechNova</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f172a;
        }

        .admin-login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div class="admin-login-card">
        <h1 style="text-align: center; margin-bottom: 2rem; font-family: 'Outfit', sans-serif;">Admin Portal</h1>

        <form id="admin-login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required>
            </div>
            <div id="error-msg" style="color: #ff4757; font-size: 0.9rem; margin-bottom: 1rem; display: none;">Invalid
                credentials</div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <div style="text-align: center; margin-top: 1rem;">
            <a href="/" style="color: var(--text-muted); font-size: 0.9rem;">← Back to Site</a>
        </div>
    </div>

    <script type="module">
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple mock auth for admin
            if (email === 'admin@technova.com' && password === 'admin123') {
                localStorage.setItem('adminUser', JSON.stringify({ name: 'Admin', role: 'admin' }));
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
